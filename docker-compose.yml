# Grading API (FastAPI) — local or single-host cloud (same image, env from host/secret store).
#
#   copy grading-server/.env.example → grading-server/.env  (fill secrets)
#   docker compose up --build
#
# Host port: GRADING_PORT=9000 docker compose up
#
services:
  grading-api:
    build:
      context: ./grading-server
      dockerfile: Dockerfile
    ports:
      - "${GRADING_PORT:-8000}:8000"
    env_file:
      - ./grading-server/.env
    environment:
      PORT: "8000"
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://127.0.0.1:8000/health"]
      interval: 20s
      timeout: 5s
      retries: 5
      start_period: 40s
